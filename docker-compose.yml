services:
  wallet-headless:
    image: hathornetwork/hathor-wallet-headless:latest
    environment:
      HEADLESS_HTTP_BIND: "0.0.0.0"
      HEADLESS_HTTP_PORT: "8000"
      HEADLESS_NETWORK: testnet
      HEADLESS_SERVER: http://node1.playground.testnet.hathor.network/v1a/
      HEADLESS_SEED_DEFAULT: "abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about"
      HEADLESS_ENABLED_PLUGINS: debug
    entrypoint: ["node", "dist/index.js"]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000/wallet/status',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  facilitator:
    build: .
    environment:
      FULLNODE_URL: http://node1.playground.testnet.hathor.network
      WALLET_HEADLESS_URL: http://wallet-headless:8000
      BLUEPRINT_ID: ${BLUEPRINT_ID:-}
      CHANNEL_BLUEPRINT_ID: ${CHANNEL_BLUEPRINT_ID:-}
      FACILITATOR_WALLET_ID: facilitator
      FACILITATOR_ADDRESS: ${FACILITATOR_ADDRESS:-}
      SELLER_ADDRESS: ${SELLER_ADDRESS:-}
    command: ["node", "facilitator.js"]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8402/x402/verify',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      wallet-headless:
        condition: service_healthy

  resource-server:
    build: .
    environment:
      FULLNODE_URL: http://node1.playground.testnet.hathor.network
      WALLET_HEADLESS_URL: http://wallet-headless:8000
      BLUEPRINT_ID: ${BLUEPRINT_ID:-}
      CHANNEL_BLUEPRINT_ID: ${CHANNEL_BLUEPRINT_ID:-}
      FACILITATOR_ADDRESS: ${FACILITATOR_ADDRESS:-}
      SELLER_ADDRESS: ${SELLER_ADDRESS:-}
      RESOURCE_SERVER_PORT: "3001"
      FACILITATOR_URL: http://facilitator:8402
    command: ["node", "resource-server.js"]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/weather',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "4021:3001"
    depends_on:
      wallet-headless:
        condition: service_healthy
      facilitator:
        condition: service_healthy

  dapp:
    build:
      context: ./dapp
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    ports:
      - "4020:3000"
    depends_on:
      resource-server:
        condition: service_healthy
